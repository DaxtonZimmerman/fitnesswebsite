<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership - Gym Website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="main-nav">
            <a href="index.html" class="logo">
                <img src="images/M.png" alt="Gym Logo">
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-right">
                <a href="signin.html" class="btn-signin">Sign In</a>
                <a href="services.html" class="btn-join">Join Now</a>
            </div>
        </nav>
    </header>

    <main>
        <section id="membership">
            <h1>Sign Up for Membership</h1>
            <form id="membership-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="plan">Selected Plan:</label>
                    <select id="plan" name="plan" required>
                        <option value="Basic Membership">Basic Membership - $29/month</option>
                        <option value="Premium Membership">Premium Membership - $59/month</option>
                        <option value="Elite Membership">Elite Membership - $99/month</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
            <div id="confirmation" style="display:none; margin-top: 20px; color: #1ddcbd; font-weight: bold;">Thank you for signing up! We'll contact you soon.</div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
